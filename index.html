<div id="comments"></div>

<h3>Ostavi komentar</h3>
<input id="name" placeholder="Tvoje ime"><br><br>
<textarea id="comment" placeholder="Komentar"></textarea><br><br>
<button onclick="postComment()">Post</button>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxLX9Tzxnlgt0aU6b6HVFzCKrkqYLMu1zGR7aLt3JY1OGpDlbVCSCwRsRufNUNFoTN3/exec"; // ovde stavi URL iz Google Apps Script

const params = new URLSearchParams(window.location.search);
const PAGE_ID = params.get("page") || "default";

// Učitava komentare
async function loadComments() {
  const res = await fetch(API_URL);
  const data = await res.json();

  const container = document.getElementById("comments");
  container.innerHTML = "";

  data.forEach(row => {
    if (row.page === PAGE_ID) {
      container.innerHTML += `
        <div style="margin-bottom:10px;">
          <b>${row.name}</b> (${new Date(row.date).toLocaleString()})<br>
          ${row.comment}
        </div>
      `;
    }
  });
}

// Dodaje komentar
async function postComment() {
  const name = document.getElementById("name").value.trim();
  const comment = document.getElementById("comment").value.trim();

  if(!name || !comment) return alert("Popuni oba polja!");

  await fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      page: PAGE_ID,
      name: name,
      comment: comment
    })
  });

  document.getElementById("name").value = "";
  document.getElementById("comment").value = "";

  loadComments();
}

// Pokreni učitavanje odmah
loadComments();
</script>
