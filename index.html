<div id="comments"></div>

<h3>Ostavi komentar</h3>
<input id="name" placeholder="Tvoje ime"><br><br>
<textarea id="comment" placeholder="Komentar"></textarea><br><br>
<button onclick="postComment()">Post</button>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzjVUAWPVeCrW2-rhVwmEYV8yjxJ_wK6FZuNA_ngX_xK_BMGSlkp9qrnIvEOlDSyvYQ/exec";

const params = new URLSearchParams(window.location.search);
const PAGE_ID = params.get("page") || "default";
  
async function loadComments() {
  const res = await fetch(API_URL);
  const data = await res.json();

  const container = document.getElementById("comments");
  container.innerHTML = "";

  data.forEach(row => {
    if (row[0] === PAGE_ID) {
      container.innerHTML += `
        <div style="margin-bottom:10px;">
          <b>${row[1]}</b><br>
          ${row[2]}
        </div>
      `;
    }
  });
}

async function postComment() {
  const name = document.getElementById("name").value;
  const comment = document.getElementById("comment").value;

  await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      page: PAGE_ID,
      name: name,
      comment: comment
    })
  });

  loadComments();
}

loadComments();
</script>
